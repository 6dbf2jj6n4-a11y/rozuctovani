{% extends "admin/base_site.html" %}

{% block content %}
<div style="max-width: 480px;">
    <p>
        Kopíruješ kartu <strong>{{ original.description|default:"bez popisu" }}</strong>
        (klient: {{ original.client }}) včetně jejích ploch. Vyber, komu má nová kopie patřit:
    </p>
    <form method="post">
        {% csrf_token %}
        <div style="margin: 16px 0;">
            <label for="id_new_client" style="display: block; font-weight: 600; margin-bottom: 6px;">
                Nový klient
            </label>
            <select name="new_client" id="id_new_client" required style="width: 100%; padding: 8px;">
                <option value="">-- vyber klienta --</option>
                {% for client in clients %}
                    <option value="{{ client.pk }}">{{ client }}</option>
                {% endfor %}
            </select>
        </div>
        <input type="submit" value="Vytvořit kopii" class="button default" style="background-color: #2563eb; color: white; font-weight: 600; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;">
        <a href="{% url 'admin:core_clientcard_change' original.pk %}" class="button" style="margin-left: 8px;">Zrušit</a>
    </form>
</div>
{% endblock %}
